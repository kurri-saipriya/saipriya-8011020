<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Accordion</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
 
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center text-primary mb-4">

            Community Event Accordion

        </h1>

        <!-- Accordion -->

        <div class="accordion"
             id="eventAccordion">

            <!-- Accordion Item 1 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapseOne">

                        Cultural Festival

                    </button>

                </h2>

                <div id="collapseOne"
                     class="accordion-collapse collapse show"
                     data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        Enjoy music, dance, and cultural performances.

                    </div>

                </div>

            </div>

            <!-- Accordion Item 2 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapseTwo">

                        Health Awareness Program

                    </button>

                </h2>

                <div id="collapseTwo"
                     class="accordion-collapse collapse"
                     data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        Free health checkups and wellness sessions.

                    </div>

                </div>

            </div>

            <!-- Accordion Item 3 -->

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapseThree">

                        Educational Workshop

                    </button>

                </h2>

                <div id="collapseThree"
                     class="accordion-collapse collapse"
                     data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        Interactive learning and skill development programs.

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
