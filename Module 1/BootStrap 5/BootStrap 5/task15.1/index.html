<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Borders and Rounded Corners</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container text-center mt-5">

        <h1 class="text-primary mb-4">

            Profile Image Styling

        </h1>

        <!-- Styled Image -->

        <img src="https://via.placeholder.com/200"
             alt="Profile Image"

             class="border
                    border-primary
                    border-3
                    rounded-circle
                    shadow">

    </div>

</body>

</html>
