<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fixed Footer</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-primary">

            Community Event Portal

        </h1>

        <p>

            Scroll the page to see the fixed footer.

        </p>

    </div>

    <!-- Fixed Footer -->

    <footer class="position-fixed
                   bottom-0
                   start-0
                   w-100
                   bg-dark
                   text-white
                   text-center
                   p-3">

        © 2026 Community Event Portal

    </footer>

</body>

</html>
