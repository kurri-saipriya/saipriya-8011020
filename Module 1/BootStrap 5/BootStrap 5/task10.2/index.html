<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Navigation Tabs and Pills</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="container mt-5">

    <!-- Simple Nav -->

    <h2 class="text-primary mb-3">

        Simple Navigation

    </h2>

    <ul class="nav mb-5">

        <li class="nav-item">

            <a class="nav-link active"
               href="#">

                Home

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Events

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Contact

            </a>

        </li>

    </ul>


    <!-- Nav Tabs -->

    <h2 class="text-success mb-3">

        Navigation Tabs

    </h2>

    <ul class="nav nav-tabs mb-5">

        <li class="nav-item">

            <a class="nav-link active"
               href="#">

                Upcoming Events

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Workshops

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Sports

            </a>

        </li>

    </ul>


    <!-- Nav Pills -->

    <h2 class="text-danger mb-3">

        Navigation Pills

    </h2>

    <ul class="nav nav-pills">

        <li class="nav-item">

            <a class="nav-link active"
               href="#">

                Dashboard

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Profile

            </a>

        </li>

        <li class="nav-item">

            <a class="nav-link"
               href="#">

                Settings

            </a>

        </li>

    </ul>

</body>

</html>
