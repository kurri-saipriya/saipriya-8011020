<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Gradient Background</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Gradient Background Card -->

        <div class="bg-dark bg-gradient
                    text-white
                    p-5
                    rounded
                    text-center">

            <h1>

                Community Event Portal

            </h1>

            <p>

                Welcome to the local community dashboard
                with Bootstrap gradient backgrounds.

            </p>

            <button class="btn btn-light">

                Explore Events

            </button>

        </div>

    </div>

</body>

</html>
