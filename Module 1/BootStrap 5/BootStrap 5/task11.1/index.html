<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Profile Card</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <!-- Card -->

                <div class="card shadow">

                    <!-- Card Image -->

                    <img src="https://via.placeholder.com/350x200"
                         class="card-img-top"
                         alt="Profile Image">

                    <!-- Card Body -->

                    <div class="card-body">

                        <!-- Card Title -->

                        <h3 class="card-title text-primary">

                            John Doe

                        </h3>

                        <!-- Card Text -->

                        <p class="card-text">

                            Community Event Coordinator
                            managing local cultural and
                            educational programs.

                        </p>

                        <!-- Button -->

                        <a href="#"
                           class="btn btn-success">

                            View Profile

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
