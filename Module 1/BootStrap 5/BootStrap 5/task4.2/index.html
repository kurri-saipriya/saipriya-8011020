<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Four Column Layout</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <div class="row text-center">

            <!-- Column 1 -->

            <div class="col-sm-3 bg-primary text-white p-4">

                Column 1

            </div>

            <!-- Column 2 -->

            <div class="col-sm-3 bg-success text-white p-4">

                Column 2

            </div>

            <!-- Column 3 -->

            <div class="col-sm-3 bg-danger text-white p-4">

                Column 3

            </div>

            <!-- Column 4 -->

            <div class="col-sm-3 bg-warning text-dark p-4">

                Column 4

            </div>

        </div>

    </div>

</body>

</html>
