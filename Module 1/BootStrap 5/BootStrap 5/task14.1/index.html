<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Display and Visibility</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Hidden on All Screens -->

        <div class="d-none bg-danger text-white p-4 mb-4">

            This section is hidden on all screen sizes.

        </div>

        <!-- Visible from Medium Screens -->

        <div class="d-none d-md-block
                    bg-primary text-white p-4 mb-4">

            Visible only on medium and larger screens.

        </div>

        <!-- Flex Display on Large Screens -->

        <div class="d-none d-lg-flex
                    bg-success text-white p-4
                    justify-content-between">

            <span>

                Large Screen Section

            </span>

            <span>

                Flex Layout Active

            </span>

        </div>

    </div>

</body>

</html>
