<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Media Object</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Media Object -->

        <div class="d-flex align-items-start bg-white p-4 shadow rounded">

            <!-- Left Image -->

            <img src="https://via.placeholder.com/120"
                 class="me-4 rounded"
                 alt="Profile Image">

            <!-- Content -->

            <div>

                <h3 class="text-primary">

                    Community Volunteer

                </h3>

                <p>

                    Volunteers help organize cultural festivals,
                    health awareness programs, educational workshops,
                    and community cleanliness drives.

                </p>

                <button class="btn btn-success">

                    Read More

                </button>

            </div>

        </div>

    </div>

</body>

</html>
