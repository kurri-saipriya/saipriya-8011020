<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Folder Structure</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary">
            Bootstrap Folder Structure

        </h1>

        <p>
            CSS Folder:
            Used for styling and layouts.
        </p>
        <p>
            JS Folder:
            Used for Bootstrap JavaScript plugins.
        </p>
        <p>
            Icons Folder:
            Used for Bootstrap icons.
        </p>

        <!-- Bootstrap Icon Example -->

        <i class="bi bi-house-fill text-danger fs-1"></i>
    </div>

    <!-- Bootstrap JS -->

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
