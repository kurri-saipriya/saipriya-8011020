<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Button Groups and Toggle Buttons</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="container mt-5">

    <h2 class="text-primary mb-4">

        Bootstrap Button Groups

    </h2>

    <!-- Button Group -->

    <div class="btn-group mb-4">

        <button class="btn btn-primary">

            Home

        </button>

        <button class="btn btn-success">

            Events

        </button>

        <button class="btn btn-danger">

            Contact

        </button>

    </div>

    <h2 class="text-success mb-4">

        Toggle Buttons with Checkboxes

    </h2>

    <!-- Toggle Buttons -->

    <div class="btn-group"
         role="group">

        <!-- Checkbox 1 -->

        <input type="checkbox"
               class="btn-check"
               id="btncheck1"
               autocomplete="off">

        <label class="btn btn-outline-primary"
               for="btncheck1">

            Music Event

        </label>

        <!-- Checkbox 2 -->

        <input type="checkbox"
               class="btn-check"
               id="btncheck2"
               autocomplete="off">

        <label class="btn btn-outline-success"
               for="btncheck2">

            Workshop

        </label>

        <!-- Checkbox 3 -->

        <input type="checkbox"
               class="btn-check"
               id="btncheck3"
               autocomplete="off">

        <label class="btn btn-outline-danger"
               for="btncheck3">

            Sports Event

        </label>

    </div>

</body>

</html>
