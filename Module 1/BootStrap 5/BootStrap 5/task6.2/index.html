<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Flexbox Card Layout</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">

        <!-- Card Layout -->

        <div class="card p-4">
            <!-- Flexbox -->
            <div class="d-flex justify-content-between align-items-center">

                <!-- Left Content -->

                <div>
                    <h3>
                        Community Event
                    </h3>
                    <p>
                        Cultural Festival Registration
                    </p>
                </div>
                <!-- Right Button -->

                <button class="btn btn-primary">
                    Register
                </button>
            </div>
        </div>
    </div>
</body>
</html>
