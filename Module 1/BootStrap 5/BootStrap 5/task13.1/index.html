<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Dashboard</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <!-- Heading -->

        <h1 class="text-center text-primary mb-5">

            Community Dashboard

        </h1>

        <!-- Dashboard Cards -->

        <div class="row g-4">

            <!-- Primary Card -->

            <div class="col-md-3">

                <div class="bg-primary text-white
                            p-4 rounded text-center">

                    <h3>

                        Events

                    </h3>

                    <p>

                        25 Upcoming Events

                    </p>

                </div>

            </div>

            <!-- Warning Card -->

            <div class="col-md-3">

                <div class="bg-warning text-dark
                            p-4 rounded text-center">

                    <h3>

                        Alerts

                    </h3>

                    <p>

                        5 New Notifications

                    </p>

                </div>

            </div>

            <!-- Success Card -->

            <div class="col-md-3">

                <div class="bg-success text-white
                            p-4 rounded text-center">

                    <h3>

                        Registrations

                    </h3>

                    <p>

                        120 Registered Users

                    </p>

                </div>

            </div>

            <!-- Danger Card -->

            <div class="col-md-3">

                <div class="bg-danger text-white
                            p-4 rounded text-center">

                    <h3>

                        Issues

                    </h3>

                    <p>

                        3 Pending Complaints

                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
