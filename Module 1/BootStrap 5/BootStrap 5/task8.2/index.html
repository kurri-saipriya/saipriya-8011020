<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Floating Login Form</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow p-4">

                    <h2 class="text-center text-primary mb-4">

                        Login Form

                    </h2>

                    <!-- Login Form -->

                    <form>

                        <!-- Email -->

                        <div class="form-floating mb-3">

                            <input type="email"
                                   class="form-control"
                                   id="email"
                                   placeholder="name@example.com">

                            <label for="email">

                                Email address

                            </label>

                        </div>

                        <!-- Password -->

                        <div class="form-floating mb-3">

                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   placeholder="Password">

                            <label for="password">

                                Password

                            </label>

                        </div>

                        <!-- Login Button -->

                        <button type="submit"
                                class="btn btn-success w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
