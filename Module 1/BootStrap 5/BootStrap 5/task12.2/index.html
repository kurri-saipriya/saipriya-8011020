<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Pricing Section</title>

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <!-- Heading -->

        <h1 class="text-center text-primary mb-5">

            Pricing Plans

        </h1>

        <!-- Pricing Row -->

        <div class="row g-4">

            <!-- Basic Plan -->

            <div class="col-md-4">

                <div class="card text-center p-4 shadow">

                    <h2 class="mb-3">

                        Basic

                    </h2>

                    <h3 class="text-success mb-4">

                        ₹499

                    </h3>

                    <p class="mb-4">

                        Access to community events
                        and workshops.

                    </p>

                    <button class="btn btn-primary">

                        Choose Plan

                    </button>

                </div>

            </div>

            <!-- Standard Plan -->

            <div class="col-md-4">

                <div class="card text-center p-4 shadow">

                    <h2 class="mb-3">

                        Standard

                    </h2>

                    <h3 class="text-warning mb-4">

                        ₹999

                    </h3>

                    <p class="mb-4">

                        Includes premium events
                        and special activities.

                    </p>

                    <button class="btn btn-success">

                        Choose Plan

                    </button>

                </div>

            </div>

            <!-- Premium Plan -->

            <div class="col-md-4">

                <div class="card text-center p-4 shadow">

                    <h2 class="mb-3">

                        Premium

                    </h2>

                    <h3 class="text-danger mb-4">

                        ₹1499

                    </h3>

                    <p class="mb-4">

                        Full access to all
                        community programs.

                    </p>

                    <button class="btn btn-danger">

                        Choose Plan

                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
